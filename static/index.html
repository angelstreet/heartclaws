<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartClaws — Open World</title>
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d1a;
  --panel: #12122a;
  --card: #1a1a36;
  --border: #2a2a4a;
  --green: #00ff88;
  --red: #ff4444;
  --blue: #4488ff;
  --yellow: #ffaa00;
  --cyan: #00ccff;
  --magenta: #cc66ff;
  --pink: #ff66aa;
  --lime: #88ff00;
  --text: #e0e0f0;
  --text-dim: #8888aa;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.header-title {
  display: flex;
  align-items: center;
}
.header-title img {
  height: 72px;
  width: auto;
  filter: none;
}
.header-logo-right {
  height: 48px;
  width: auto;
  margin-left: 16px;
}
.header-logo-left {
  height: 48px;
  width: auto;
  margin-right: 16px;
  filter: none;
}

.player-dropdown-wrap {
  position: relative;
  flex: 0 0 240px;
}
.player-dropdown-wrap input {
  width: 100%;
  padding: 6px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.player-dropdown-wrap input:focus { border-color: var(--cyan); }
.player-dropdown-wrap .dropdown-list {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 4px 4px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 100;
}
.player-dropdown-wrap .dropdown-list.open { display: block; }
.player-dropdown-wrap .dropdown-item {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.player-dropdown-wrap .dropdown-item:hover { background: var(--border); }
.player-dropdown-wrap .dropdown-item.active { background: #2a2a5a; }
.player-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}

.hb-counter {
  font-size: 14px;
  color: var(--yellow);
  font-weight: 600;
}
.status-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  background: #1a3a1a;
  color: var(--green);
  border: 1px solid #2a4a2a;
}
.match-link {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 3px;
}
.match-link:hover { color: var(--cyan); border-color: var(--cyan); }

/* Layout */
.main {
  display: flex;
  height: calc(100vh - 52px);
}
.left-panel {
  flex: 0 0 60%;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.right-panel {
  flex: 0 0 40%;
  padding: 16px;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Hex Grid */
.map-container {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.map-container h3 {
  font-size: 13px;
  color: var(--cyan);
  margin-bottom: 12px;
}
.hex-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
}
.hex-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  min-height: 42px;
}
.hex-cell:hover { transform: scale(1.08); z-index: 2; }
.hex-cell.highlighted { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,204,255,0.4); }
.hex-cell .cell-id { font-size: 7px; opacity: 0.6; }
.hex-cell .cell-structs { font-size: 8px; font-weight: 600; }
.hex-cell .cell-controller {
  position: absolute;
  bottom: 2px;
  right: 3px;
  width: 6px; height: 6px;
  border-radius: 50%;
}

.biome-IRONLANDS  { background: #cc663380; }
.biome-DATAFIELDS { background: #3366cc80; }
.biome-GROVELANDS { background: #33cc6680; }
.biome-BARRENS    { background: #99663380; }
.biome-NEXUS      { background: #cc66ff80; }
.biome-UNKNOWN    { background: #44444480; }

.hex-tooltip {
  display: none;
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 10px;
  border-radius: 4px;
  font-size: 10px;
  line-height: 1.5;
  z-index: 200;
  max-width: 220px;
  pointer-events: none;
}
.hex-tooltip.visible { display: block; }

/* Leaderboard */
.leaderboard {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
}
.leaderboard h3 {
  font-size: 13px;
  color: var(--yellow);
  margin-bottom: 8px;
}
.leaderboard table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.leaderboard th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  padding: 4px 6px;
  border-bottom: 1px solid var(--border);
}
.leaderboard td {
  padding: 4px 6px;
  border-bottom: 1px solid #1a1a2a;
}
.leaderboard tr:hover td { background: #1a1a3a; }

/* Cards */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
}
.card h3 {
  font-size: 13px;
  margin-bottom: 8px;
}
.card h3.green { color: var(--green); }
.card h3.cyan { color: var(--cyan); }
.card h3.yellow { color: var(--yellow); }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.stat-item {
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
}
.stat-item .label { color: var(--text-dim); }
.stat-item .value { font-weight: 600; }

.player-name-big {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.player-status {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
}
.player-status.alive { background: #1a3a1a; color: var(--green); }
.player-status.dead  { background: #3a1a1a; color: var(--red); }

.resource-bar {
  display: flex;
  gap: 12px;
  margin: 8px 0;
  font-size: 11px;
}
.resource-bar .res {
  display: flex;
  align-items: center;
  gap: 4px;
}
.res-metal { color: #cc8833; }
.res-data  { color: var(--cyan); }
.res-bio   { color: var(--green); }

.struct-list {
  font-size: 10px;
  max-height: 120px;
  overflow-y: auto;
  margin-top: 6px;
}
.struct-list .struct-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
  border-bottom: 1px solid #1a1a2a;
}

.sector-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.sector-tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--card);
  border: 1px solid var(--border);
}

/* Event Log */
.event-log {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}
.event-log .event-row {
  font-size: 10px;
  padding: 4px 0;
  border-bottom: 1px solid #1a1a2a;
  line-height: 1.4;
}
.event-row .ev-hb {
  color: var(--yellow);
  font-weight: 600;
  margin-right: 6px;
}
.event-row .ev-type {
  color: var(--magenta);
  margin-right: 4px;
}
.event-row .ev-cost {
  color: var(--yellow);
  font-weight: 600;
  font-size: 10px;
}
.event-row .ev-fail {
  color: var(--red);
  font-weight: 600;
}
.event-row b {
  color: var(--cyan);
  font-weight: 600;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><img src="static/logo-label.png" alt="HeartClaws"></div>
  <div class="player-dropdown-wrap">
    <input type="text" id="playerSearch" placeholder="Select player... (All)" autocomplete="off">
    <div class="dropdown-list" id="playerDropdown"></div>
  </div>
  <div class="hb-counter" id="hbCounter">HB: --</div>
  <div class="status-badge" id="statusBadge">Connecting...</div>
  <img src="static/heartclaws-logo-alpha.png" alt="HeartClaws" class="header-logo-left">
  <a class="match-link" href="match.html">Private Match</a>
</div>

<div class="main">
  <div class="left-panel">
    <div class="map-container">
      <h3>World Map (8x8)</h3>
      <div class="hex-grid" id="hexGrid"></div>
    </div>
    <div class="leaderboard">
      <h3>Leaderboard</h3>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Player</th><th>Territory</th><th>Economy</th>
            <th>Military</th><th>Influence</th><th>Composite</th>
          </tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>

  <div class="right-panel">
    <div id="detailPanel"></div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <h3 class="cyan" id="eventTitle">Event Log</h3>
      <div class="event-log" id="eventLog"></div>
    </div>
  </div>
</div>

<div class="hex-tooltip" id="hexTooltip"></div>

<script>
/* API Base (nginx proxy aware) */
var API_BASE = (function() {
  var path = window.location.pathname.replace(/\/+$/, '');
  if (path.endsWith('.html')) path = path.substring(0, path.lastIndexOf('/'));
  return path;
})();
function apiUrl(endpoint) { return API_BASE + endpoint; }

/* Player colors */
var PLAYER_COLORS = ['#00ff88','#ff4444','#4488ff','#ffaa00','#cc66ff','#00ccff','#ff66aa','#88ff00'];
var playerColorMap = {};
var colorIndex = 0;
function getPlayerColor(pid) {
  if (!pid) return '#555';
  if (!playerColorMap[pid]) {
    playerColorMap[pid] = PLAYER_COLORS[colorIndex % PLAYER_COLORS.length];
    colorIndex++;
  }
  return playerColorMap[pid];
}

/* State */
var worldState = null;
var leaderboardData = [];
var historyEvents = [];
var selectedPlayer = null;
var playerViewData = null;
var worldStatsCache = null;

/* DOM refs */
var $hb = document.getElementById('hbCounter');
var $status = document.getElementById('statusBadge');
var $grid = document.getElementById('hexGrid');
var $lbBody = document.getElementById('lbBody');
var $detail = document.getElementById('detailPanel');
var $eventLog = document.getElementById('eventLog');
var $eventTitle = document.getElementById('eventTitle');
var $search = document.getElementById('playerSearch');
var $dropdown = document.getElementById('playerDropdown');
var $tooltip = document.getElementById('hexTooltip');

/* Dropdown */
$search.addEventListener('focus', function() { openDropdown(); });
$search.addEventListener('input', function() { openDropdown(); renderDropdown(); });
document.addEventListener('click', function(e) {
  if (!e.target.closest('.player-dropdown-wrap')) closeDropdown();
});

function openDropdown() { $dropdown.classList.add('open'); renderDropdown(); }
function closeDropdown() { $dropdown.classList.remove('open'); }

function renderDropdown() {
  if (!worldState) { $dropdown.innerHTML = ''; return; }
  var filter = $search.value.toLowerCase();
  var players = Object.values(worldState.players || {});
  var html = '<div class="dropdown-item' + (!selectedPlayer ? ' active' : '') + '" data-pid="">'
    + '<span class="player-dot" style="background:#888"></span> All Players</div>';
  players.forEach(function(p) {
    if (!p.alive) return;
    if (filter && p.name.toLowerCase().indexOf(filter) === -1 && p.player_id.toLowerCase().indexOf(filter) === -1) return;
    var c = getPlayerColor(p.player_id);
    html += '<div class="dropdown-item' + (selectedPlayer === p.player_id ? ' active' : '') + '" data-pid="' + p.player_id + '">'
      + '<span class="player-dot" style="background:' + c + '"></span> ' + esc(p.name)
      + ' <span style="color:var(--text-dim);font-size:10px">(' + p.player_id + ')</span></div>';
  });
  $dropdown.innerHTML = html;
  $dropdown.querySelectorAll('.dropdown-item').forEach(function(el) {
    el.addEventListener('click', function() {
      var pid = el.getAttribute('data-pid');
      selectedPlayer = pid || null;
      $search.value = pid ? (worldState.players[pid] ? worldState.players[pid].name : pid) : '';
      closeDropdown();
      onPlayerChanged();
    });
  });
}

function onPlayerChanged() {
  if (selectedPlayer) {
    fetchPlayerView();
    $eventTitle.textContent = 'Events — ' + (worldState.players[selectedPlayer] ? worldState.players[selectedPlayer].name : selectedPlayer);
  } else {
    playerViewData = null;
    $eventTitle.textContent = 'Event Log';
  }
  renderDetail();
  renderEvents();
  renderGrid();
}

/* Fetch */
function fetchAll() {
  var fetches = [
    fetch(apiUrl('/world/state')).then(function(r) { return r.json(); }),
    fetch(apiUrl('/world/leaderboard')).then(function(r) { return r.json(); }),
    fetch(apiUrl('/world/history?limit=100&offset=0')).then(function(r) { return r.json(); }),
    fetch(apiUrl('/world/stats')).then(function(r) { return r.json(); }),
  ];
  Promise.all(fetches).then(function(results) {
    worldState = results[0];
    leaderboardData = results[1];
    historyEvents = (results[2].events || []).reverse();
    worldStatsCache = results[3];

    $hb.textContent = 'HB: ' + worldState.heartbeat;
    $status.textContent = 'Live';
    $status.style.background = '#1a3a1a';
    $status.style.color = '#00ff88';

    renderGrid();
    renderLeaderboard();
    renderDetail();
    renderEvents();

    if (selectedPlayer) fetchPlayerView();
  }).catch(function(err) {
    console.error('Fetch error:', err);
    $status.textContent = 'Error';
    $status.style.background = '#3a1a1a';
    $status.style.color = '#ff4444';
  });
}

function fetchPlayerView() {
  if (!selectedPlayer) return;
  fetch(apiUrl('/world/state/' + selectedPlayer))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      playerViewData = data;
      renderDetail();
    }).catch(function() {});
}

/* Render: Hex Grid */
function renderGrid() {
  if (!worldState) return;
  var sectors = worldState.world ? worldState.world.sectors : {};
  var html = '';
  for (var row = 0; row < 8; row++) {
    for (var col = 0; col < 8; col++) {
      var sid = 'H_' + col + '_' + row;
      var sector = sectors[sid];
      if (!sector) {
        html += '<div class="hex-cell biome-UNKNOWN"><span class="cell-id">' + sid + '</span></div>';
        continue;
      }
      var biome = sector.biome || 'UNKNOWN';
      var ctrl = sector.controller_player_id;
      var structCount = (sector.structure_ids || []).length;
      var highlighted = selectedPlayer && ctrl === selectedPlayer ? ' highlighted' : '';
      html += '<div class="hex-cell biome-' + biome + highlighted + '" data-sid="' + sid + '">'
        + '<span class="cell-id">' + sid + '</span>';
      if (structCount > 0) html += '<span class="cell-structs">' + structCount + ' str</span>';
      if (ctrl) html += '<span class="cell-controller" style="background:' + getPlayerColor(ctrl) + '"></span>';
      html += '</div>';
    }
  }
  $grid.innerHTML = html;
  $grid.querySelectorAll('.hex-cell[data-sid]').forEach(function(el) {
    el.addEventListener('mouseenter', function(e) { showTooltip(e, el.getAttribute('data-sid')); });
    el.addEventListener('mousemove', function(e) { moveTooltip(e); });
    el.addEventListener('mouseleave', function() { hideTooltip(); });
  });
}

function showTooltip(e, sid) {
  var sectors = worldState.world ? worldState.world.sectors : {};
  var s = sectors[sid];
  if (!s) return;
  var ctrl = s.controller_player_id;
  var ctrlName = ctrl && worldState.players[ctrl] ? worldState.players[ctrl].name : (ctrl || 'None');
  var biome = s.biome || '?';
  var structs = (s.structure_ids || []).length;
  var resources = (s.resource_nodes || []);
  var resText = resources.map(function(r) {
    return (r.resource_type || r.type || '?') + (r.depleted ? ' (depleted)' : '');
  }).join(', ') || 'None';
  $tooltip.innerHTML = '<b>' + sid + '</b> — ' + biome + '<br>'
    + 'Controller: <b>' + esc(ctrlName) + '</b><br>'
    + 'Structures: ' + structs + '<br>'
    + 'Resources: ' + resText;
  $tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  $tooltip.style.left = (e.clientX + 12) + 'px';
  $tooltip.style.top = (e.clientY + 12) + 'px';
}
function hideTooltip() { $tooltip.classList.remove('visible'); }

/* Render: Leaderboard */
function renderLeaderboard() {
  if (!leaderboardData.length) {
    $lbBody.innerHTML = '<tr><td colspan="7" style="color:var(--text-dim);text-align:center;padding:12px">No players yet</td></tr>';
    return;
  }
  var html = '';
  leaderboardData.sort(function(a, b) { return (b.composite || 0) - (a.composite || 0); });
  leaderboardData.forEach(function(p, i) {
    var name = worldState && worldState.players[p.player_id] ? worldState.players[p.player_id].name : p.player_id;
    var c = getPlayerColor(p.player_id);
    html += '<tr>'
      + '<td>' + (i + 1) + '</td>'
      + '<td><span class="player-dot" style="background:' + c + ';vertical-align:middle"></span> ' + esc(name) + '</td>'
      + '<td>' + (p.territory || 0) + '</td>'
      + '<td>' + (p.economy || 0).toFixed(1) + '</td>'
      + '<td>' + (p.military || 0) + '</td>'
      + '<td>' + (p.influence || 0) + '</td>'
      + '<td style="color:#00ccff;font-weight:600">' + (p.composite || 0).toFixed(2) + '</td>'
      + '</tr>';
  });
  $lbBody.innerHTML = html;
}

/* Render: Detail Panel */
function renderDetail() {
  if (!worldState) { $detail.innerHTML = ''; return; }

  if (!selectedPlayer) {
    renderWorldStats();
    return;
  }

  var p = worldState.players[selectedPlayer];
  if (!p) {
    $detail.innerHTML = '<div class="card"><p style="color:var(--text-dim)">Player not found</p></div>';
    return;
  }

  var c = getPlayerColor(selectedPlayer);
  var html = '<div class="card">';
  html += '<div class="player-name-big"><span class="player-dot" style="background:' + c + ';width:12px;height:12px"></span>'
    + esc(p.name) + ' <span class="player-status ' + (p.alive ? 'alive' : 'dead') + '">' + (p.alive ? 'ALIVE' : 'DEAD') + '</span></div>';

  html += '<div class="resource-bar">'
    + '<div class="res res-metal">Metal: <b>' + (p.metal || 0) + '</b></div>'
    + '<div class="res res-data">Data: <b>' + (p.data || 0) + '</b></div>'
    + '<div class="res res-bio">Bio: <b>' + (p.biomass || 0) + '</b></div>'
    + '</div>';

  html += '<div style="font-size:11px;margin:4px 0;color:var(--text-dim)">'
    + 'Energy Reserve: <span style="color:#ffaa00">' + (p.energy_reserve || 0) + '</span>'
    + '</div>';

  /* Structures */
  html += '<div style="margin-top:8px"><span style="font-size:11px;color:var(--text-dim)">Structures:</span>';
  if (playerViewData && playerViewData.structures) {
    var structs = typeof playerViewData.structures === 'object' ? Object.values(playerViewData.structures) : playerViewData.structures;
    if (structs.length === 0) {
      html += '<div style="font-size:10px;color:var(--text-dim);padding:4px 0">None</div>';
    } else {
      html += '<div class="struct-list">';
      structs.forEach(function(st) {
        html += '<div class="struct-row"><span>' + (st.structure_type || st.type || '?') + '</span>'
          + '<span style="color:var(--text-dim)">' + (st.sector_id || '?') + ' — HP ' + (st.hp || 0) + '/' + (st.max_hp || st.hp || '?') + '</span></div>';
      });
      html += '</div>';
    }
  } else {
    var count = 0;
    Object.values(worldState.structures || {}).forEach(function(st) {
      if (st.owner_player_id === selectedPlayer) count++;
    });
    html += '<div style="font-size:10px;color:var(--text-dim);padding:4px 0">' + count + ' structures</div>';
  }
  html += '</div>';

  /* Controlled sectors */
  html += '<div style="margin-top:8px"><span style="font-size:11px;color:var(--text-dim)">Controlled Sectors:</span>';
  var sectorList = [];
  if (playerViewData && playerViewData.controlled_sectors) {
    sectorList = playerViewData.controlled_sectors;
  } else {
    Object.values(worldState.world.sectors || {}).forEach(function(s) {
      if (s.controller_player_id === selectedPlayer) sectorList.push(s.sector_id);
    });
  }
  html += '<div class="sector-tags">';
  if (sectorList.length === 0) {
    html += '<span style="font-size:10px;color:var(--text-dim)">None</span>';
  } else {
    sectorList.forEach(function(sid) {
      html += '<span class="sector-tag">' + sid + '</span>';
    });
  }
  html += '</div></div>';

  html += '</div>';
  $detail.innerHTML = html;
}

function renderWorldStats() {
  var stats = worldStatsCache;
  if (!stats) {
    $detail.innerHTML = '<div class="card"><h3 class="green">World Stats</h3><p style="color:var(--text-dim)">Loading...</p></div>';
    return;
  }
  var html = '<div class="card"><h3 class="green">World Stats</h3><div class="stats-grid">';
  var hbInterval = stats.heartbeat_interval_seconds || '--';
  var hbLabel = hbInterval !== '--' ? (hbInterval >= 60 ? (hbInterval / 60) + 'min' : hbInterval + 's') : '--';
  var totalPlayers = (stats.active_players || 0) + (stats.inactive_players || 0);
  var items = [
    ['Heartbeat Interval', hbLabel],
    ['Total Players', totalPlayers + ' (' + (stats.active_players || 0) + ' active, ' + (stats.inactive_players || 0) + ' inactive)'],
    ['All-Time Players', stats.total_players_alltime || 0],
    ['Total Structures', stats.total_structures || 0],
    ['Controlled Sectors', (stats.controlled_sectors || 0) + ' / ' + (stats.total_sectors || 64)],
    ['Total Actions', (stats.actions_resolved || 0) + ' resolved, ' + (stats.actions_failed || 0) + ' failed'],
    ['Season', stats.season || 1],
    ['Heartbeat', worldState ? worldState.heartbeat : '--'],
  ];
  items.forEach(function(it) {
    html += '<div class="stat-item"><span class="label">' + it[0] + '</span><span class="value">' + it[1] + '</span></div>';
  });
  html += '</div></div>';
  $detail.innerHTML = html;
}

/* Render: Events */
function renderEvents() {
  if (!historyEvents.length) {
    $eventLog.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px;font-size:11px">No events yet</div>';
    return;
  }
  var filtered = historyEvents;
  if (selectedPlayer) {
    filtered = historyEvents.filter(function(ev) {
      return ev.actor_player_id === selectedPlayer
        || (ev.details && ev.details.player_id === selectedPlayer)
        || (ev.details && ev.details.old_controller === selectedPlayer)
        || (ev.details && ev.details.new_controller === selectedPlayer);
    });
  }
  var html = '';
  filtered.slice(0, 200).forEach(function(ev) {
    var hb = ev.heartbeat || ev.submitted_heartbeat || '?';
    var type = ev.event_type || '?';
    var desc = formatEvent(ev);
    html += '<div class="event-row">'
      + '<span class="ev-hb">HB' + hb + '</span>'
      + '<span class="ev-type">' + type + '</span> '
      + desc + '</div>';
  });
  if (filtered.length === 0) {
    html = '<div style="color:var(--text-dim);text-align:center;padding:20px;font-size:11px">No events for this player</div>';
  }
  $eventLog.innerHTML = html;
}

function formatEvent(ev) {
  var d = ev.details || {};
  var type = ev.event_type || '';
  var actor = ev.actor_player_id || '';
  var actorName = worldState && worldState.players[actor] ? worldState.players[actor].name : actor;
  var costTag = d.energy_cost != null ? ' <span class="ev-cost">[' + d.energy_cost + 'E]</span>' : '';
  var payload = d.payload || {};

  if (type === 'STRUCTURE_BUILT') return esc(actorName) + ' built <b>' + (d.structure_type || '?') + '</b> in ' + (d.sector_id || '?') + costTag;
  if (type === 'STRUCTURE_DESTROYED') return '<b>' + (ev.target_id || '?') + '</b> destroyed in ' + (d.sector_id || '?');
  if (type === 'SECTOR_CONTROL_CHANGED') {
    var oldN = d.old_controller && worldState.players[d.old_controller] ? worldState.players[d.old_controller].name : (d.old_controller || 'none');
    var newN = d.new_controller && worldState.players[d.new_controller] ? worldState.players[d.new_controller].name : (d.new_controller || 'none');
    return (ev.target_id || '?') + ': ' + esc(oldN) + ' &rarr; ' + esc(newN);
  }
  if (type === 'ACTION_RESOLVED') {
    var detail = '';
    if (d.action_type === 'BUILD_STRUCTURE') detail = ' <b>' + (payload.structure_type || '?') + '</b> in ' + (payload.sector_id || '?');
    else if (d.action_type === 'ATTACK_STRUCTURE') detail = ' target ' + (payload.target_structure_id || '?');
    else if (d.action_type === 'SCAN_SECTOR') detail = ' ' + (payload.sector_id || '?');
    else if (d.action_type === 'SET_POLICY') detail = ' ' + (payload.stance || '?') + ' toward ' + (payload.target_player_id || '?');
    else if (d.action_type === 'TRANSFER_RESOURCE') detail = ' ' + (payload.amount || '?') + ' ' + (payload.resource_type || '?') + ' to ' + (payload.target_player_id || '?');
    else if (d.action_type === 'REMOVE_STRUCTURE') detail = ' ' + (payload.structure_id || '?');
    return esc(actorName) + ' ' + (d.action_type || '?') + detail + costTag;
  }
  if (type === 'ACTION_FAILED') {
    return '<span class="ev-fail">' + esc(actorName) + ' ' + (d.action_type || '?') + ' FAILED</span>: ' + (d.failure_reason || d.reason || '?') + costTag;
  }
  if (type === 'STRUCTURE_ATTACKED') return esc(actorName) + ' attacked <b>' + (ev.target_id || '?') + '</b> (' + (d.damage || '?') + ' dmg, ' + (d.remaining_hp || '?') + ' HP left)' + costTag;
  if (type === 'ENERGY_COMPUTED') return esc(actorName) + ' energy: income ' + (d.income || 0) + ', upkeep ' + (d.upkeep || 0) + ', available ' + (d.available || 0);
  if (type === 'HEARTBEAT_STARTED') return 'Heartbeat ' + (d.heartbeat || '?') + ' started';
  if (type === 'HEARTBEAT_COMPLETED') return 'Heartbeat completed';
  return type;
}

/* Util */
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* Init + auto-refresh */
fetchAll();
setInterval(fetchAll, 10000);
</script>
</body>
</html>
