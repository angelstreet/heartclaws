<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartClaws — Live Match Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    color: #c8c8d4;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
  }

  :root {
    --green: #00ff88;
    --red: #ff4444;
    --blue: #4488ff;
    --yellow: #ffaa00;
    --cyan: #00ccff;
    --magenta: #cc66ff;
    --bg: #0d0d1a;
    --bg-panel: #12122a;
    --bg-card: #1a1a36;
    --border: #2a2a4a;
    --text: #c8c8d4;
    --text-dim: #6a6a8a;
  }

  /* ---- Header ---- */
  #header {
    background: #0a0a18;
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  #header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--cyan);
    margin-right: 16px;
    white-space: nowrap;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-group label {
    color: var(--text-dim);
    font-size: 11px;
  }

  .ctrl-group select,
  .ctrl-group input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 3px;
  }

  .ctrl-group input[type="number"] { width: 60px; }
  .ctrl-group input[type="range"] { width: 100px; accent-color: var(--cyan); }

  .ctrl-group button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .ctrl-group button:hover {
    background: #24244a;
  }

  .ctrl-group button.primary {
    border-color: var(--cyan);
    color: #fff;
    background: rgba(0,204,255,0.15);
  }

  #hb-counter {
    color: var(--yellow);
    font-weight: 700;
    font-size: 14px;
    margin-left: 8px;
  }

  #speed-display {
    color: var(--text-dim);
    font-size: 11px;
    min-width: 45px;
  }

  /* ---- Main layout ---- */
  #main {
    display: flex;
    height: calc(100vh - 48px);
  }

  #left-panel {
    flex: 0 0 60%;
    padding: 12px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  #right-panel {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
  }

  /* ---- Map ---- */
  #map-container {
    margin-bottom: 12px;
  }

  #map-container h2 {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .map-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 720px;
  }

  .map-cell-wrapper {
    display: flex;
    align-items: center;
    position: relative;
  }

  .map-cell {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    min-height: 72px;
    flex: 1;
    position: relative;
    transition: border-color 0.4s, background 0.4s;
  }

  .map-cell.ctrl-p1 {
    border-color: var(--green);
    background: rgba(0,255,136,0.06);
  }

  .map-cell.ctrl-p2 {
    border-color: var(--red);
    background: rgba(255,68,68,0.06);
  }

  .map-cell .cell-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .map-cell .cell-id {
    font-weight: 700;
    font-size: 12px;
  }

  .map-cell .cell-ctrl {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 2px;
  }

  .cell-ctrl.p1 { color: var(--green); background: rgba(0,255,136,0.15); }
  .cell-ctrl.p2 { color: var(--red); background: rgba(255,68,68,0.15); }
  .cell-ctrl.none { color: var(--text-dim); }

  .map-cell .cell-structures {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    word-break: break-all;
  }

  .struct-tag {
    display: inline-block;
    padding: 0 3px;
    border-radius: 2px;
    margin: 1px;
    font-size: 9px;
    font-weight: 700;
  }

  .struct-tag.p1 { color: var(--green); background: rgba(0,255,136,0.12); }
  .struct-tag.p2 { color: var(--red); background: rgba(255,68,68,0.12); }

  .cell-metal {
    color: var(--yellow);
    font-size: 10px;
    font-weight: 700;
  }

  /* Connectors */
  .h-connector {
    width: 12px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .v-connector-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 720px;
  }

  .v-connector-cell {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .v-connector {
    width: 2px;
    height: 10px;
    background: var(--border);
  }

  /* ---- Resource Dashboard ---- */
  #resource-dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 720px;
  }

  .player-resources {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
  }

  .player-resources.p1 { border-color: rgba(0,255,136,0.4); }
  .player-resources.p2 { border-color: rgba(255,68,68,0.4); }

  .player-resources h3 {
    font-size: 12px;
    margin-bottom: 6px;
  }

  .player-resources.p1 h3 { color: var(--green); }
  .player-resources.p2 h3 { color: var(--red); }

  .res-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 1px 0;
  }

  .res-label { color: var(--text-dim); }
  .res-value { color: var(--text); font-weight: 700; }

  /* ---- Event Log ---- */
  #right-panel h2 {
    font-size: 13px;
    color: var(--text-dim);
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
  }

  #event-log {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px;
    font-size: 11px;
    line-height: 1.6;
  }

  .event-line {
    padding: 1px 0;
    border-bottom: 1px solid rgba(42,42,74,0.3);
  }

  .ev-hb {
    color: var(--text-dim);
    font-size: 10px;
  }

  .ev-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin: 0 4px;
    vertical-align: middle;
  }

  .ev-dot.p1 { background: var(--green); }
  .ev-dot.p2 { background: var(--red); }
  .ev-dot.sys { background: var(--text-dim); }

  .ev-build { color: var(--green); }
  .ev-attack { color: var(--red); }
  .ev-scan { color: var(--blue); }
  .ev-energy { color: var(--yellow); }
  .ev-control { color: var(--yellow); }
  .ev-other { color: var(--text-dim); }

  /* ---- Result Overlay ---- */
  #result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  #result-overlay.visible {
    display: flex;
  }

  #result-box {
    background: var(--bg-panel);
    border: 2px solid var(--cyan);
    border-radius: 8px;
    padding: 28px 36px;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }

  #result-box h2 {
    font-size: 20px;
    color: var(--cyan);
    margin-bottom: 10px;
  }

  #result-winner {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  #result-reason {
    color: var(--text-dim);
    margin-bottom: 16px;
    font-size: 13px;
  }

  .result-stats {
    text-align: left;
    font-size: 11px;
    width: 100%;
    border-collapse: collapse;
  }

  .result-stats th {
    color: var(--text-dim);
    text-align: left;
    padding: 3px 8px;
    border-bottom: 1px solid var(--border);
  }

  .result-stats td {
    padding: 3px 8px;
  }

  .result-stats .col-p1 { color: var(--green); }
  .result-stats .col-p2 { color: var(--red); }

  #result-close {
    margin-top: 16px;
    background: var(--bg-card);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 20px;
    border-radius: 4px;
    cursor: pointer;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header / Controls -->
<div id="header">
  <h1>HeartClaws</h1>

  <div class="ctrl-group">
    <label>P1</label>
    <select id="sel-p1">
      <option value="random">Random</option>
      <option value="expansionist" selected>Expansionist</option>
      <option value="economist">Economist</option>
      <option value="aggressor">Aggressor</option>
      <option value="turtle">Turtle</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>P2</label>
    <select id="sel-p2">
      <option value="random">Random</option>
      <option value="expansionist">Expansionist</option>
      <option value="economist" selected>Economist</option>
      <option value="aggressor">Aggressor</option>
      <option value="turtle">Turtle</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Seed</label>
    <input type="number" id="inp-seed" value="42" min="0">
  </div>

  <div class="ctrl-group">
    <label>HBs</label>
    <input type="number" id="inp-hbs" value="30" min="1" max="200">
  </div>

  <div class="ctrl-group">
    <label>Speed</label>
    <input type="range" id="inp-speed" min="100" max="2000" step="50" value="500">
    <span id="speed-display">500ms</span>
  </div>

  <div class="ctrl-group">
    <button id="btn-start" class="primary">Start</button>
    <button id="btn-pause" disabled>Pause</button>
    <button id="btn-step" disabled>Step</button>
    <button id="btn-reset">Reset</button>
  </div>

  <span id="hb-counter">HB 0</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Left Panel: Map + Resources -->
  <div id="left-panel">
    <div id="map-container">
      <h2>Sector Map</h2>
      <div id="map-area"></div>
    </div>
    <h2 style="font-size:13px;color:var(--text-dim);margin-bottom:8px;">Resources</h2>
    <div id="resource-dashboard">
      <div class="player-resources p1">
        <h3 id="res-p1-title">P1 — ?</h3>
        <div class="res-row"><span class="res-label">Energy</span><span class="res-value" id="res-p1-energy">—</span></div>
        <div class="res-row"><span class="res-label">Income</span><span class="res-value" id="res-p1-income">—</span></div>
        <div class="res-row"><span class="res-label">Upkeep</span><span class="res-value" id="res-p1-upkeep">—</span></div>
        <div class="res-row"><span class="res-label">Available</span><span class="res-value" id="res-p1-available">—</span></div>
        <div class="res-row"><span class="res-label">Metal</span><span class="res-value" id="res-p1-metal">—</span></div>
        <div class="res-row"><span class="res-label">Data</span><span class="res-value" id="res-p1-data">—</span></div>
        <div class="res-row"><span class="res-label">Biomass</span><span class="res-value" id="res-p1-biomass">—</span></div>
        <div class="res-row"><span class="res-label">Sectors</span><span class="res-value" id="res-p1-sectors">—</span></div>
      </div>
      <div class="player-resources p2">
        <h3 id="res-p2-title">P2 — ?</h3>
        <div class="res-row"><span class="res-label">Energy</span><span class="res-value" id="res-p2-energy">—</span></div>
        <div class="res-row"><span class="res-label">Income</span><span class="res-value" id="res-p2-income">—</span></div>
        <div class="res-row"><span class="res-label">Upkeep</span><span class="res-value" id="res-p2-upkeep">—</span></div>
        <div class="res-row"><span class="res-label">Available</span><span class="res-value" id="res-p2-available">—</span></div>
        <div class="res-row"><span class="res-label">Metal</span><span class="res-value" id="res-p2-metal">—</span></div>
        <div class="res-row"><span class="res-label">Data</span><span class="res-value" id="res-p2-data">—</span></div>
        <div class="res-row"><span class="res-label">Biomass</span><span class="res-value" id="res-p2-biomass">—</span></div>
        <div class="res-row"><span class="res-label">Sectors</span><span class="res-value" id="res-p2-sectors">—</span></div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Event Log -->
  <div id="right-panel">
    <h2>Event Log</h2>
    <div id="event-log"></div>
  </div>
</div>

<!-- Result Overlay -->
<div id="result-overlay">
  <div id="result-box">
    <h2>Match Complete</h2>
    <div id="result-winner"></div>
    <div id="result-reason"></div>
    <table class="result-stats" id="result-stats-table"></table>
    <button id="result-close">Close</button>
  </div>
</div>

<script>
(function() {
  // ---- Elements ----
  const selP1 = document.getElementById('sel-p1');
  const selP2 = document.getElementById('sel-p2');
  const inpSeed = document.getElementById('inp-seed');
  const inpHbs = document.getElementById('inp-hbs');
  const inpSpeed = document.getElementById('inp-speed');
  const speedDisp = document.getElementById('speed-display');
  const btnStart = document.getElementById('btn-start');
  const btnPause = document.getElementById('btn-pause');
  const btnStep = document.getElementById('btn-step');
  const btnReset = document.getElementById('btn-reset');
  const hbCounter = document.getElementById('hb-counter');
  const mapArea = document.getElementById('map-area');
  const eventLog = document.getElementById('event-log');
  const resultOverlay = document.getElementById('result-overlay');
  const resultWinner = document.getElementById('result-winner');
  const resultReason = document.getElementById('result-reason');
  const resultTable = document.getElementById('result-stats-table');
  const resultClose = document.getElementById('result-close');

  // ---- Map layout ----
  const MAP_ROWS = [
    ['S1', 'F1', 'F2', 'F3'],
    ['S2', 'F4', 'F5', 'F6'],
    ['S3', 'F7', 'F8', 'F9'],
  ];

  const STRUCT_ABBREV = {
    'SANCTUARY_CORE': 'SAN',
    'EXTRACTOR': 'EXT',
    'REACTOR': 'REA',
    'BATTERY': 'BAT',
    'RELAY': 'REL',
    'TOWER': 'TOW',
    'FACTORY': 'FAC',
    'ATTACK_NODE': 'ATT',
  };

  // ---- State ----
  let ws = null;
  let running = false;
  let paused = false;

  // ---- Speed slider ----
  inpSpeed.addEventListener('input', function() {
    speedDisp.textContent = this.value + 'ms';
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'speed', speed_ms: parseInt(this.value) }));
    }
  });

  // ---- Build initial empty map ----
  function buildMapDOM() {
    mapArea.innerHTML = '';
    MAP_ROWS.forEach(function(row, ri) {
      var rowDiv = document.createElement('div');
      rowDiv.className = 'map-grid';
      row.forEach(function(sid, ci) {
        if (ci > 0) {
          var hc = document.createElement('div');
          hc.className = 'h-connector';
          rowDiv.appendChild(hc);
        }
        var cell = document.createElement('div');
        cell.className = 'map-cell';
        cell.id = 'cell-' + sid;
        cell.innerHTML =
          '<div class="cell-header">' +
            '<span class="cell-id">' + sid + '</span>' +
            '<span class="cell-ctrl none" id="ctrl-' + sid + '">--</span>' +
          '</div>' +
          '<div class="cell-structures" id="structs-' + sid + '"></div>';
        rowDiv.appendChild(cell);
      });
      mapArea.appendChild(rowDiv);

      if (ri < MAP_ROWS.length - 1) {
        var vcRow = document.createElement('div');
        vcRow.className = 'v-connector-row';
        row.forEach(function(sid, ci) {
          if (ci > 0) {
            var spacer = document.createElement('div');
            spacer.style.width = '12px';
            vcRow.appendChild(spacer);
          }
          var vcCell = document.createElement('div');
          vcCell.className = 'v-connector-cell';
          vcCell.innerHTML = '<div class="v-connector"></div>';
          vcRow.appendChild(vcCell);
        });
        mapArea.appendChild(vcRow);
      }
    });
  }

  buildMapDOM();

  // ---- Update map from data ----
  function updateMap(sectors) {
    if (!sectors) return;
    var sectorMap = {};
    sectors.forEach(function(s) { sectorMap[s.id] = s; });

    MAP_ROWS.forEach(function(row) {
      row.forEach(function(sid) {
        var s = sectorMap[sid];
        var cell = document.getElementById('cell-' + sid);
        var ctrlEl = document.getElementById('ctrl-' + sid);
        var structsEl = document.getElementById('structs-' + sid);
        if (!cell || !s) return;

        // Controller
        cell.classList.remove('ctrl-p1', 'ctrl-p2');
        ctrlEl.classList.remove('p1', 'p2', 'none');
        if (s.controller === 'p1') {
          cell.classList.add('ctrl-p1');
          ctrlEl.classList.add('p1');
          ctrlEl.textContent = 'P1';
        } else if (s.controller === 'p2') {
          cell.classList.add('ctrl-p2');
          ctrlEl.classList.add('p2');
          ctrlEl.textContent = 'P2';
        } else {
          ctrlEl.classList.add('none');
          ctrlEl.textContent = '--';
        }

        // Structures
        var html = '';
        if (s.has_metal) {
          html += '<span class="cell-metal">* Metal</span> ';
        }
        if (s.structures && s.structures.length > 0) {
          s.structures.forEach(function(st) {
            var abbr = STRUCT_ABBREV[st.type] || st.type.substring(0,3);
            var cls = st.owner === 'p1' ? 'p1' : 'p2';
            html += '<span class="struct-tag ' + cls + '">' + abbr + '</span>';
          });
        }
        structsEl.innerHTML = html;
      });
    });
  }

  // ---- Update resources ----
  function updateResources(players) {
    if (!players) return;
    ['p1', 'p2'].forEach(function(pid) {
      var p = players[pid];
      if (!p) return;
      document.getElementById('res-' + pid + '-title').textContent =
        pid.toUpperCase() + ' -- ' + p.strategy;
      document.getElementById('res-' + pid + '-energy').textContent = p.energy_reserve;
      document.getElementById('res-' + pid + '-income').textContent = p.income;
      document.getElementById('res-' + pid + '-upkeep').textContent = p.upkeep;
      document.getElementById('res-' + pid + '-available').textContent = p.available;
      document.getElementById('res-' + pid + '-metal').textContent = p.metal;
      document.getElementById('res-' + pid + '-data').textContent = p.data;
      document.getElementById('res-' + pid + '-biomass').textContent = p.biomass;
      document.getElementById('res-' + pid + '-sectors').textContent = p.sectors_controlled;
    });
  }

  // ---- Event log ----
  function classifyEvent(ev) {
    var t = ev.type || '';
    if (t === 'STRUCTURE_BUILT') return 'build';
    if (t === 'STRUCTURE_ATTACKED' || t === 'STRUCTURE_DESTROYED') return 'attack';
    if (t === 'SCAN_COMPLETED') return 'scan';
    if (t === 'ENERGY_COMPUTED' || t === 'UPKEEP_DEACTIVATION') return 'energy';
    if (t === 'SECTOR_CONTROL_CHANGED') return 'control';
    return 'other';
  }

  function appendEvents(events) {
    if (!events || events.length === 0) return;
    events.forEach(function(ev) {
      var cls = classifyEvent(ev);
      var dotCls = ev.player === 'p1' ? 'p1' : ev.player === 'p2' ? 'p2' : 'sys';
      var line = document.createElement('div');
      line.className = 'event-line';
      line.innerHTML =
        '<span class="ev-hb">[HB ' + ev.heartbeat + ']</span>' +
        '<span class="ev-dot ' + dotCls + '"></span>' +
        '<span class="ev-' + cls + '">' + escapeHtml(ev.description) + '</span>';
      eventLog.appendChild(line);
    });
    eventLog.scrollTop = eventLog.scrollHeight;
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- Result overlay ----
  function showResult(data) {
    var w = data.winner;
    if (w) {
      var color = w === 'p1' ? 'var(--green)' : 'var(--red)';
      resultWinner.innerHTML = '<span style="color:' + color + '">' + w.toUpperCase() + ' WINS</span>';
    } else {
      resultWinner.innerHTML = '<span style="color:var(--yellow)">DRAW</span>';
    }
    resultReason.textContent = 'Reason: ' + data.reason + ' | Heartbeats: ' + data.heartbeats;

    var stats = data.stats;
    if (stats) {
      var rows = [
        ['Strategy', stats.p1.strategy, stats.p2.strategy],
        ['Sectors', stats.p1.sectors_controlled, stats.p2.sectors_controlled],
        ['Built', stats.p1.structures_built, stats.p2.structures_built],
        ['Lost', stats.p1.structures_lost, stats.p2.structures_lost],
        ['Attacks', stats.p1.attacks_made, stats.p2.attacks_made],
        ['Energy earned', stats.p1.total_energy_earned, stats.p2.total_energy_earned],
        ['Final metal', stats.p1.final_metal, stats.p2.final_metal],
      ];
      var html = '<tr><th></th><th class="col-p1">P1</th><th class="col-p2">P2</th></tr>';
      rows.forEach(function(r) {
        html += '<tr><td class="res-label">' + r[0] + '</td><td class="col-p1">' + r[1] + '</td><td class="col-p2">' + r[2] + '</td></tr>';
      });
      resultTable.innerHTML = html;
    }

    resultOverlay.classList.add('visible');
  }

  resultClose.addEventListener('click', function() {
    resultOverlay.classList.remove('visible');
  });

  // ---- WebSocket ----
  function connect() {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/ws/match';
    ws = new WebSocket(url);

    ws.onopen = function() {
      console.log('WS connected');
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch(err) { return; }

      if (msg.type === 'heartbeat') {
        var d = msg.data;
        hbCounter.textContent = 'HB ' + d.heartbeat;
        updateMap(d.map ? d.map.sectors : null);
        updateResources(d.players);
        appendEvents(d.events);
      } else if (msg.type === 'result') {
        showResult(msg.data);
        running = false;
        paused = false;
        updateButtons();
      } else if (msg.type === 'error') {
        appendEvents([{ heartbeat: 0, player: null, type: 'other', description: 'ERROR: ' + (msg.message || 'unknown') }]);
      }
    };

    ws.onclose = function() {
      console.log('WS closed');
      running = false;
      paused = false;
      updateButtons();
    };

    ws.onerror = function() {
      console.error('WS error');
    };
  }

  function updateButtons() {
    btnStart.disabled = running;
    btnPause.disabled = !running;
    btnStep.disabled = !running;
    btnPause.textContent = paused ? 'Resume' : 'Pause';
  }

  // ---- Controls ----
  btnStart.addEventListener('click', function() {
    if (running) return;
    eventLog.innerHTML = '';
    resultOverlay.classList.remove('visible');
    hbCounter.textContent = 'HB 0';
    buildMapDOM();

    // Reset resource displays
    ['p1','p2'].forEach(function(pid) {
      ['energy','income','upkeep','available','metal','data','biomass','sectors'].forEach(function(f) {
        var el = document.getElementById('res-' + pid + '-' + f);
        if (el) el.textContent = '—';
      });
    });

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      connect();
      // Wait for open before sending
      ws.addEventListener('open', function handler() {
        ws.removeEventListener('open', handler);
        sendStart();
      });
    } else {
      sendStart();
    }
  });

  function sendStart() {
    running = true;
    paused = false;
    updateButtons();
    ws.send(JSON.stringify({
      action: 'start',
      p1: selP1.value,
      p2: selP2.value,
      seed: parseInt(inpSeed.value) || 42,
      max_heartbeats: parseInt(inpHbs.value) || 30,
      speed_ms: parseInt(inpSpeed.value) || 500,
    }));
  }

  btnPause.addEventListener('click', function() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (paused) {
      ws.send(JSON.stringify({ action: 'resume' }));
      paused = false;
    } else {
      ws.send(JSON.stringify({ action: 'pause' }));
      paused = true;
    }
    updateButtons();
  });

  btnStep.addEventListener('click', function() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!paused) {
      ws.send(JSON.stringify({ action: 'pause' }));
      paused = true;
      updateButtons();
    }
    ws.send(JSON.stringify({ action: 'step' }));
  });

  btnReset.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    }
    ws = null;
    running = false;
    paused = false;
    updateButtons();
    eventLog.innerHTML = '';
    hbCounter.textContent = 'HB 0';
    resultOverlay.classList.remove('visible');
    buildMapDOM();
  });

  // Initial connection
  connect();
  updateButtons();
})();
</script>
</body>
</html>
