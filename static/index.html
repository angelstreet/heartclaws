<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartClaws — Live Simulation Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    color: #c8c8d4;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
  }

  :root {
    --green: #00ff88;
    --red: #ff4444;
    --blue: #4488ff;
    --yellow: #ffaa00;
    --cyan: #00ccff;
    --magenta: #cc66ff;
    --bg: #0d0d1a;
    --bg-panel: #12122a;
    --bg-card: #1a1a36;
    --border: #2a2a4a;
    --text: #c8c8d4;
    --text-dim: #6a6a8a;
  }

  /* ---- Header ---- */
  #header {
    background: #0a0a18;
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  #header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--cyan);
    margin-right: 16px;
    white-space: nowrap;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-group label {
    color: var(--text-dim);
    font-size: 11px;
  }

  .ctrl-group select,
  .ctrl-group input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 3px;
  }

  .ctrl-group input[type="number"] { width: 60px; }
  .ctrl-group input[type="range"] { width: 100px; accent-color: var(--cyan); }

  .ctrl-group button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .ctrl-group button:hover {
    background: #24244a;
  }

  .ctrl-group button.primary {
    border-color: var(--cyan);
    color: #fff;
    background: rgba(0,204,255,0.15);
  }

  #hb-counter {
    color: var(--yellow);
    font-weight: 700;
    font-size: 14px;
    margin-left: 8px;
  }

  #speed-display {
    color: var(--text-dim);
    font-size: 11px;
    min-width: 45px;
  }

  /* ---- Main layout ---- */
  #main {
    display: flex;
    height: calc(100vh - 48px);
  }

  #left-panel {
    flex: 0 0 60%;
    padding: 12px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  #right-panel {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
  }

  /* ---- Map ---- */
  #map-container {
    margin-bottom: 12px;
  }

  #map-container h2 {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .map-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 720px;
  }

  .map-cell-wrapper {
    display: flex;
    align-items: center;
    position: relative;
  }

  .map-cell {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    min-height: 72px;
    flex: 1;
    position: relative;
    transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
    cursor: pointer;
  }

  .map-cell.ctrl-p1 {
    border-color: var(--green);
    background: rgba(0,255,136,0.06);
  }

  .map-cell.ctrl-p2 {
    border-color: var(--red);
    background: rgba(255,68,68,0.06);
  }

  .map-cell.glow-p1 {
    box-shadow: 0 0 12px rgba(0,255,136,0.4), inset 0 0 8px rgba(0,255,136,0.1);
  }

  .map-cell.glow-p2 {
    box-shadow: 0 0 12px rgba(255,68,68,0.4), inset 0 0 8px rgba(255,68,68,0.1);
  }

  .map-cell .cell-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .map-cell .cell-id {
    font-weight: 700;
    font-size: 12px;
  }

  .map-cell .cell-ctrl {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 2px;
  }

  .cell-ctrl.p1 { color: var(--green); background: rgba(0,255,136,0.15); }
  .cell-ctrl.p2 { color: var(--red); background: rgba(255,68,68,0.15); }
  .cell-ctrl.none { color: var(--text-dim); }

  .map-cell .cell-structures {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    word-break: break-all;
  }

  .struct-tag {
    display: inline-block;
    padding: 0 3px;
    border-radius: 2px;
    margin: 1px;
    font-size: 9px;
    font-weight: 700;
  }

  .struct-tag.p1 { color: var(--green); background: rgba(0,255,136,0.12); }
  .struct-tag.p2 { color: var(--red); background: rgba(255,68,68,0.12); }

  .cell-metal {
    color: var(--yellow);
    font-size: 10px;
    font-weight: 700;
  }

  /* Connectors */
  .h-connector {
    width: 12px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .v-connector-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 720px;
  }

  .v-connector-cell {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .v-connector {
    width: 2px;
    height: 10px;
    background: var(--border);
  }

  /* ---- Sector Tooltip ---- */
  .sector-tooltip {
    display: none;
    position: absolute;
    z-index: 50;
    background: var(--bg-panel);
    border: 1px solid var(--cyan);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 11px;
    line-height: 1.5;
    min-width: 200px;
    max-width: 280px;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
  }

  .sector-tooltip.pinned {
    display: block;
    pointer-events: auto;
  }

  .sector-tooltip.hover-visible {
    display: block;
  }

  .sector-tooltip h4 {
    color: var(--cyan);
    font-size: 12px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
  }

  .sector-tooltip .tt-section {
    margin-bottom: 4px;
  }

  .sector-tooltip .tt-label {
    color: var(--text-dim);
    font-size: 10px;
  }

  .tt-struct-row { padding: 1px 0; }
  .tt-struct-row .p1-text { color: var(--green); }
  .tt-struct-row .p2-text { color: var(--red); }

  /* ---- Stats Bar ---- */
  #stats-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    max-width: 720px;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  #stats-bar .stat-item {
    display: flex;
    gap: 4px;
  }

  #stats-bar .stat-val {
    color: var(--cyan);
    font-weight: 700;
  }

  /* ---- Resource Dashboard ---- */
  #resource-dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 720px;
  }

  .player-resources {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
  }

  .player-resources.p1 { border-color: rgba(0,255,136,0.4); }
  .player-resources.p2 { border-color: rgba(255,68,68,0.4); }

  .player-resources h3 {
    font-size: 12px;
    margin-bottom: 6px;
  }

  .player-resources.p1 h3 { color: var(--green); }
  .player-resources.p2 h3 { color: var(--red); }

  .res-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 1px 0;
  }

  .res-label { color: var(--text-dim); }
  .res-value { color: var(--text); font-weight: 700; }

  /* ---- Event Log ---- */
  #event-header {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0;
  }

  .event-tab {
    padding: 8px 14px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .event-tab:hover {
    color: var(--text);
  }

  .event-tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

  #scroll-lock-toggle {
    margin-left: auto;
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    color: var(--text-dim);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    margin-right: 10px;
  }

  #scroll-lock-toggle.locked {
    color: var(--yellow);
    border-color: var(--yellow);
  }

  #event-log {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px;
    font-size: 11px;
    line-height: 1.6;
  }

  .event-line {
    padding: 1px 0;
    border-bottom: 1px solid rgba(42,42,74,0.3);
  }

  .event-line.hidden-by-filter {
    display: none;
  }

  .hb-separator {
    text-align: center;
    color: var(--text-dim);
    font-size: 10px;
    padding: 4px 0;
    border-bottom: none;
    letter-spacing: 1px;
  }

  .ev-hb {
    color: var(--text-dim);
    font-size: 10px;
  }

  .ev-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin: 0 4px;
    vertical-align: middle;
  }

  .ev-dot.p1 { background: var(--green); }
  .ev-dot.p2 { background: var(--red); }
  .ev-dot.sys { background: var(--text-dim); }

  .ev-build { color: var(--green); }
  .ev-attack { color: var(--red); }
  .ev-scan { color: var(--blue); }
  .ev-energy { color: var(--yellow); }
  .ev-control { color: var(--yellow); }
  .ev-other { color: var(--text-dim); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header / Controls -->
<div id="header">
  <h1>HeartClaws</h1>

  <div class="ctrl-group">
    <label>P1</label>
    <select id="sel-p1">
      <option value="random">Random</option>
      <option value="expansionist" selected>Expansionist</option>
      <option value="economist">Economist</option>
      <option value="aggressor">Aggressor</option>
      <option value="turtle">Turtle</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>P2</label>
    <select id="sel-p2">
      <option value="random">Random</option>
      <option value="expansionist">Expansionist</option>
      <option value="economist" selected>Economist</option>
      <option value="aggressor">Aggressor</option>
      <option value="turtle">Turtle</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Seed</label>
    <input type="number" id="inp-seed" value="42" min="0">
  </div>

  <div class="ctrl-group">
    <label>Speed</label>
    <input type="range" id="inp-speed" min="100" max="2000" step="50" value="1000">
    <span id="speed-display">1000ms</span>
  </div>

  <div class="ctrl-group">
    <button id="btn-start" class="primary">Start Simulation</button>
    <button id="btn-pause" disabled>Pause</button>
    <button id="btn-step" disabled>Step</button>
    <button id="btn-reset">Reset</button>
  </div>

  <span id="hb-counter">HB 0</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Left Panel: Map + Stats + Resources -->
  <div id="left-panel">
    <div id="map-container">
      <h2>Sector Map</h2>
      <div id="map-area"></div>
    </div>
    <div id="stats-bar">
      <div class="stat-item"><span>HB:</span><span class="stat-val" id="stat-hb">0</span></div>
      <div class="stat-item"><span>Structures:</span><span class="stat-val" id="stat-built">0</span></div>
      <div class="stat-item"><span>Destroyed:</span><span class="stat-val" id="stat-destroyed">0</span></div>
      <div class="stat-item"><span>Control changes:</span><span class="stat-val" id="stat-control">0</span></div>
    </div>
    <h2 style="font-size:13px;color:var(--text-dim);margin-bottom:8px;">Resources</h2>
    <div id="resource-dashboard">
      <div class="player-resources p1">
        <h3 id="res-p1-title">P1 -- ?</h3>
        <div class="res-row"><span class="res-label">Energy</span><span class="res-value" id="res-p1-energy">--</span></div>
        <div class="res-row"><span class="res-label">Income</span><span class="res-value" id="res-p1-income">--</span></div>
        <div class="res-row"><span class="res-label">Upkeep</span><span class="res-value" id="res-p1-upkeep">--</span></div>
        <div class="res-row"><span class="res-label">Available</span><span class="res-value" id="res-p1-available">--</span></div>
        <div class="res-row"><span class="res-label">Metal</span><span class="res-value" id="res-p1-metal">--</span></div>
        <div class="res-row"><span class="res-label">Data</span><span class="res-value" id="res-p1-data">--</span></div>
        <div class="res-row"><span class="res-label">Biomass</span><span class="res-value" id="res-p1-biomass">--</span></div>
        <div class="res-row"><span class="res-label">Sectors</span><span class="res-value" id="res-p1-sectors">--</span></div>
      </div>
      <div class="player-resources p2">
        <h3 id="res-p2-title">P2 -- ?</h3>
        <div class="res-row"><span class="res-label">Energy</span><span class="res-value" id="res-p2-energy">--</span></div>
        <div class="res-row"><span class="res-label">Income</span><span class="res-value" id="res-p2-income">--</span></div>
        <div class="res-row"><span class="res-label">Upkeep</span><span class="res-value" id="res-p2-upkeep">--</span></div>
        <div class="res-row"><span class="res-label">Available</span><span class="res-value" id="res-p2-available">--</span></div>
        <div class="res-row"><span class="res-label">Metal</span><span class="res-value" id="res-p2-metal">--</span></div>
        <div class="res-row"><span class="res-label">Data</span><span class="res-value" id="res-p2-data">--</span></div>
        <div class="res-row"><span class="res-label">Biomass</span><span class="res-value" id="res-p2-biomass">--</span></div>
        <div class="res-row"><span class="res-label">Sectors</span><span class="res-value" id="res-p2-sectors">--</span></div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Event Log -->
  <div id="right-panel">
    <div id="event-header">
      <button class="event-tab active" data-filter="all">All Events</button>
      <button class="event-tab" data-filter="p1">P1 Focus</button>
      <button class="event-tab" data-filter="p2">P2 Focus</button>
      <button id="scroll-lock-toggle">Scroll Lock</button>
    </div>
    <div id="event-log"></div>
  </div>
</div>

<script>
(function() {
  // ---- Elements ----
  var selP1 = document.getElementById('sel-p1');
  var selP2 = document.getElementById('sel-p2');
  var inpSeed = document.getElementById('inp-seed');
  var inpSpeed = document.getElementById('inp-speed');
  var speedDisp = document.getElementById('speed-display');
  var btnStart = document.getElementById('btn-start');
  var btnPause = document.getElementById('btn-pause');
  var btnStep = document.getElementById('btn-step');
  var btnReset = document.getElementById('btn-reset');
  var hbCounter = document.getElementById('hb-counter');
  var mapArea = document.getElementById('map-area');
  var eventLog = document.getElementById('event-log');
  var scrollLockToggle = document.getElementById('scroll-lock-toggle');

  var statHb = document.getElementById('stat-hb');
  var statBuilt = document.getElementById('stat-built');
  var statDestroyed = document.getElementById('stat-destroyed');
  var statControl = document.getElementById('stat-control');

  // ---- Map layout ----
  var MAP_ROWS = [
    ['S1', 'F1', 'F2', 'F3'],
    ['S2', 'F4', 'F5', 'F6'],
    ['S3', 'F7', 'F8', 'F9'],
  ];

  var STRUCT_ABBREV = {
    'SANCTUARY_CORE': 'SAN',
    'EXTRACTOR': 'EXT',
    'REACTOR': 'REA',
    'BATTERY': 'BAT',
    'RELAY': 'REL',
    'TOWER': 'TOW',
    'FACTORY': 'FAC',
    'ATTACK_NODE': 'ATT',
  };

  // ---- State ----
  var ws = null;
  var running = false;
  var paused = false;
  var scrollLocked = false;
  var activeFilter = 'all';
  var pinnedSector = null;
  var lastSectorData = {};
  var lastPlayerData = {};
  var lastHeartbeatNum = 0;

  // ---- Scroll lock ----
  scrollLockToggle.addEventListener('click', function() {
    scrollLocked = !scrollLocked;
    scrollLockToggle.classList.toggle('locked', scrollLocked);
    scrollLockToggle.textContent = scrollLocked ? 'Scroll Locked' : 'Scroll Lock';
  });

  // ---- Event filter tabs ----
  var eventTabs = document.querySelectorAll('.event-tab');
  eventTabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      eventTabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      activeFilter = tab.getAttribute('data-filter');
      applyEventFilter();
      applyMapGlow();
    });
  });

  function applyEventFilter() {
    var lines = eventLog.querySelectorAll('.event-line');
    lines.forEach(function(line) {
      if (activeFilter === 'all') {
        line.classList.remove('hidden-by-filter');
      } else {
        var player = line.getAttribute('data-player');
        var type = line.getAttribute('data-event-type');
        // Show events by/affecting the focused player, or system events (control changes, etc.)
        var show = (player === activeFilter) ||
                   (type === 'SECTOR_CONTROL_CHANGED') ||
                   (type === 'STRUCTURE_DESTROYED');
        line.classList.toggle('hidden-by-filter', !show);
      }
    });
    // Separators always visible
    var seps = eventLog.querySelectorAll('.hb-separator');
    seps.forEach(function(s) { s.classList.remove('hidden-by-filter'); });
  }

  function applyMapGlow() {
    var allCells = document.querySelectorAll('.map-cell');
    allCells.forEach(function(cell) {
      cell.classList.remove('glow-p1', 'glow-p2');
    });
    if (activeFilter === 'p1' || activeFilter === 'p2') {
      var territory = (lastPlayerData[activeFilter] || {}).territory || [];
      territory.forEach(function(sid) {
        var cell = document.getElementById('cell-' + sid);
        if (cell) cell.classList.add('glow-' + activeFilter);
      });
    }
  }

  // ---- Speed slider ----
  inpSpeed.addEventListener('input', function() {
    speedDisp.textContent = this.value + 'ms';
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'speed', speed_ms: parseInt(this.value) }));
    }
  });

  // ---- Build initial empty map ----
  function buildMapDOM() {
    mapArea.innerHTML = '';
    MAP_ROWS.forEach(function(row, ri) {
      var rowDiv = document.createElement('div');
      rowDiv.className = 'map-grid';
      row.forEach(function(sid, ci) {
        if (ci > 0) {
          var hc = document.createElement('div');
          hc.className = 'h-connector';
          rowDiv.appendChild(hc);
        }
        var wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        wrapper.style.flex = '1';

        var cell = document.createElement('div');
        cell.className = 'map-cell';
        cell.id = 'cell-' + sid;
        cell.setAttribute('data-sid', sid);
        cell.innerHTML =
          '<div class="cell-header">' +
            '<span class="cell-id">' + sid + '</span>' +
            '<span class="cell-ctrl none" id="ctrl-' + sid + '">--</span>' +
          '</div>' +
          '<div class="cell-structures" id="structs-' + sid + '"></div>';

        var tooltip = document.createElement('div');
        tooltip.className = 'sector-tooltip';
        tooltip.id = 'tooltip-' + sid;

        wrapper.appendChild(cell);
        wrapper.appendChild(tooltip);
        rowDiv.appendChild(wrapper);

        // Hover
        cell.addEventListener('mouseenter', function() {
          if (pinnedSector !== sid) {
            showTooltip(sid);
          }
        });
        cell.addEventListener('mouseleave', function() {
          if (pinnedSector !== sid) {
            hideTooltip(sid);
          }
        });
        // Click to pin/unpin
        cell.addEventListener('click', function(e) {
          e.stopPropagation();
          if (pinnedSector === sid) {
            pinnedSector = null;
            hideTooltip(sid);
          } else {
            if (pinnedSector) {
              unpinTooltip(pinnedSector);
            }
            pinnedSector = sid;
            pinTooltip(sid);
          }
        });
      });
      mapArea.appendChild(rowDiv);

      if (ri < MAP_ROWS.length - 1) {
        var vcRow = document.createElement('div');
        vcRow.className = 'v-connector-row';
        row.forEach(function(sid, ci) {
          if (ci > 0) {
            var spacer = document.createElement('div');
            spacer.style.width = '12px';
            vcRow.appendChild(spacer);
          }
          var vcCell = document.createElement('div');
          vcCell.className = 'v-connector-cell';
          vcCell.innerHTML = '<div class="v-connector"></div>';
          vcRow.appendChild(vcCell);
        });
        mapArea.appendChild(vcRow);
      }
    });

    // Click outside to unpin
    document.addEventListener('click', function() {
      if (pinnedSector) {
        unpinTooltip(pinnedSector);
        pinnedSector = null;
      }
    });
  }

  function showTooltip(sid) {
    var tt = document.getElementById('tooltip-' + sid);
    if (tt) {
      updateTooltipContent(sid);
      tt.classList.add('hover-visible');
    }
  }

  function hideTooltip(sid) {
    var tt = document.getElementById('tooltip-' + sid);
    if (tt) tt.classList.remove('hover-visible');
  }

  function pinTooltip(sid) {
    var tt = document.getElementById('tooltip-' + sid);
    if (tt) {
      updateTooltipContent(sid);
      tt.classList.add('pinned');
      tt.classList.remove('hover-visible');
    }
  }

  function unpinTooltip(sid) {
    var tt = document.getElementById('tooltip-' + sid);
    if (tt) tt.classList.remove('pinned');
  }

  function updateTooltipContent(sid) {
    var tt = document.getElementById('tooltip-' + sid);
    var s = lastSectorData[sid];
    if (!tt || !s) return;

    var html = '<h4>' + sid + ' (' + s.type + ')</h4>';

    // Structures
    if (s.structures && s.structures.length > 0) {
      html += '<div class="tt-section"><div class="tt-label">Structures</div>';
      s.structures.forEach(function(st) {
        var cls = st.owner === 'p1' ? 'p1-text' : 'p2-text';
        html += '<div class="tt-struct-row"><span class="' + cls + '">' +
          st.type + '</span> (' + st.owner.toUpperCase() + ') HP: ' + st.hp + '/' + (st.max_hp || '?') +
          (st.active ? '' : ' [inactive]') + '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="tt-section"><div class="tt-label">No structures</div></div>';
    }

    // Influence
    html += '<div class="tt-section"><div class="tt-label">Influence</div>' +
      '<div><span style="color:var(--green)">P1: ' + (s.influence_p1 || 0) + '</span> | ' +
      '<span style="color:var(--red)">P2: ' + (s.influence_p2 || 0) + '</span></div></div>';

    // Resources
    if (s.resource_nodes && s.resource_nodes.length > 0) {
      html += '<div class="tt-section"><div class="tt-label">Resources</div>';
      s.resource_nodes.forEach(function(n) {
        var status = n.depleted ? ' (depleted)' : '';
        html += '<div>' + n.type + ' [richness ' + n.richness + ']' + status + '</div>';
      });
      html += '</div>';
    }

    tt.innerHTML = html;
  }

  buildMapDOM();

  // ---- Update map from data ----
  function updateMap(sectors) {
    if (!sectors) return;
    // Store sector data for tooltips
    sectors.forEach(function(s) { lastSectorData[s.id] = s; });

    MAP_ROWS.forEach(function(row) {
      row.forEach(function(sid) {
        var s = lastSectorData[sid];
        var cell = document.getElementById('cell-' + sid);
        var ctrlEl = document.getElementById('ctrl-' + sid);
        var structsEl = document.getElementById('structs-' + sid);
        if (!cell || !s) return;

        // Controller
        cell.classList.remove('ctrl-p1', 'ctrl-p2');
        ctrlEl.classList.remove('p1', 'p2', 'none');
        if (s.controller === 'p1') {
          cell.classList.add('ctrl-p1');
          ctrlEl.classList.add('p1');
          ctrlEl.textContent = 'P1';
        } else if (s.controller === 'p2') {
          cell.classList.add('ctrl-p2');
          ctrlEl.classList.add('p2');
          ctrlEl.textContent = 'P2';
        } else {
          ctrlEl.classList.add('none');
          ctrlEl.textContent = '--';
        }

        // Structures
        var html = '';
        if (s.has_metal) {
          html += '<span class="cell-metal">* Metal</span> ';
        }
        if (s.structures && s.structures.length > 0) {
          s.structures.forEach(function(st) {
            var abbr = STRUCT_ABBREV[st.type] || st.type.substring(0,3);
            var cls = st.owner === 'p1' ? 'p1' : 'p2';
            html += '<span class="struct-tag ' + cls + '">' + abbr + '</span>';
          });
        }
        structsEl.innerHTML = html;

        // Update pinned tooltip if it's this sector
        if (pinnedSector === sid) {
          updateTooltipContent(sid);
        }
      });
    });

    applyMapGlow();
  }

  // ---- Update resources ----
  function updateResources(players) {
    if (!players) return;
    lastPlayerData = players;
    ['p1', 'p2'].forEach(function(pid) {
      var p = players[pid];
      if (!p) return;
      document.getElementById('res-' + pid + '-title').textContent =
        pid.toUpperCase() + ' -- ' + p.strategy;
      document.getElementById('res-' + pid + '-energy').textContent = p.energy_reserve;
      document.getElementById('res-' + pid + '-income').textContent = p.income;
      document.getElementById('res-' + pid + '-upkeep').textContent = p.upkeep;
      document.getElementById('res-' + pid + '-available').textContent = p.available;
      document.getElementById('res-' + pid + '-metal').textContent = p.metal;
      document.getElementById('res-' + pid + '-data').textContent = p.data;
      document.getElementById('res-' + pid + '-biomass').textContent = p.biomass;
      document.getElementById('res-' + pid + '-sectors').textContent = p.sectors_controlled;
    });
  }

  // ---- Stats bar ----
  function updateStats(stats) {
    if (!stats) return;
    statHb.textContent = stats.total_heartbeats;
    statBuilt.textContent = stats.structures_built;
    statDestroyed.textContent = stats.structures_destroyed;
    statControl.textContent = stats.control_changes;
  }

  // ---- Event log ----
  function classifyEvent(ev) {
    var t = ev.type || '';
    if (t === 'STRUCTURE_BUILT') return 'build';
    if (t === 'STRUCTURE_ATTACKED' || t === 'STRUCTURE_DESTROYED') return 'attack';
    if (t === 'SCAN_COMPLETED') return 'scan';
    if (t === 'ENERGY_COMPUTED' || t === 'UPKEEP_DEACTIVATION') return 'energy';
    if (t === 'SECTOR_CONTROL_CHANGED') return 'control';
    return 'other';
  }

  function appendEvents(events, heartbeatNum) {
    if (!events || events.length === 0) return;

    // Add heartbeat separator
    if (heartbeatNum > 0) {
      var sep = document.createElement('div');
      sep.className = 'event-line hb-separator';
      var pad = '\u2500\u2500\u2500\u2500\u2500\u2500';
      sep.textContent = pad + ' Heartbeat ' + heartbeatNum + ' ' + pad;
      eventLog.appendChild(sep);
    }

    events.forEach(function(ev) {
      var cls = classifyEvent(ev);
      var dotCls = ev.player === 'p1' ? 'p1' : ev.player === 'p2' ? 'p2' : 'sys';
      var line = document.createElement('div');
      line.className = 'event-line';
      line.setAttribute('data-player', ev.player || 'sys');
      line.setAttribute('data-event-type', ev.type || '');
      line.innerHTML =
        '<span class="ev-hb">[HB ' + ev.heartbeat + ']</span>' +
        '<span class="ev-dot ' + dotCls + '"></span>' +
        '<span class="ev-' + cls + '">' + escapeHtml(ev.description) + '</span>';

      // Apply current filter
      if (activeFilter !== 'all') {
        var player = ev.player || 'sys';
        var show = (player === activeFilter) ||
                   (ev.type === 'SECTOR_CONTROL_CHANGED') ||
                   (ev.type === 'STRUCTURE_DESTROYED');
        if (!show) line.classList.add('hidden-by-filter');
      }

      eventLog.appendChild(line);
    });

    if (!scrollLocked) {
      eventLog.scrollTop = eventLog.scrollHeight;
    }
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- WebSocket ----
  function connect() {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var basePath = location.pathname.replace(/\/[^/]*$/, '');
    var url = proto + '://' + location.host + basePath + '/ws/sim';
    ws = new WebSocket(url);

    ws.onopen = function() {
      console.log('WS connected');
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch(err) { return; }

      if (msg.type === 'heartbeat') {
        var d = msg.data;
        lastHeartbeatNum = d.heartbeat;
        hbCounter.textContent = 'HB ' + d.heartbeat;
        updateMap(d.map ? d.map.sectors : null);
        updateResources(d.players);
        updateStats(d.stats);
        appendEvents(d.events, d.heartbeat);
      } else if (msg.type === 'error') {
        appendEvents([{ heartbeat: 0, player: null, type: 'other', description: 'ERROR: ' + (msg.message || 'unknown') }], 0);
      }
    };

    ws.onclose = function() {
      console.log('WS closed');
      running = false;
      paused = false;
      btnStart.disabled = false;
      btnStart.textContent = 'Start Simulation';
      updateButtons();
    };

    ws.onerror = function() {
      console.error('WS error');
    };
  }

  function updateButtons() {
    btnStart.disabled = running;
    btnPause.disabled = !running;
    btnStep.disabled = !running;
    btnPause.textContent = paused ? 'Resume' : 'Pause';
  }

  // ---- Controls ----
  btnStart.addEventListener('click', function() {
    if (running) return;
    eventLog.innerHTML = '';
    hbCounter.textContent = 'HB 0';
    lastSectorData = {};
    lastPlayerData = {};
    lastHeartbeatNum = 0;
    pinnedSector = null;
    buildMapDOM();

    // Reset resource displays
    ['p1','p2'].forEach(function(pid) {
      ['energy','income','upkeep','available','metal','data','biomass','sectors'].forEach(function(f) {
        var el = document.getElementById('res-' + pid + '-' + f);
        if (el) el.textContent = '--';
      });
    });

    // Reset stats
    statHb.textContent = '0';
    statBuilt.textContent = '0';
    statDestroyed.textContent = '0';
    statControl.textContent = '0';

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      connect();
      ws.addEventListener('open', function handler() {
        ws.removeEventListener('open', handler);
        sendStart();
      });
    } else {
      sendStart();
    }
  });

  function sendStart() {
    running = true;
    paused = false;
    btnStart.disabled = true;
    btnStart.textContent = 'Running...';
    updateButtons();
    ws.send(JSON.stringify({
      action: 'start',
      p1: selP1.value,
      p2: selP2.value,
      seed: parseInt(inpSeed.value) || 42,
      speed_ms: parseInt(inpSpeed.value) || 1000,
    }));
  }

  btnPause.addEventListener('click', function() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (paused) {
      ws.send(JSON.stringify({ action: 'resume' }));
      paused = false;
    } else {
      ws.send(JSON.stringify({ action: 'pause' }));
      paused = true;
    }
    updateButtons();
  });

  btnStep.addEventListener('click', function() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!paused) {
      ws.send(JSON.stringify({ action: 'pause' }));
      paused = true;
      updateButtons();
    }
    ws.send(JSON.stringify({ action: 'step' }));
  });

  btnReset.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    }
    ws = null;
    running = false;
    paused = false;
    btnStart.disabled = false;
    btnStart.textContent = 'Start Simulation';
    updateButtons();
    eventLog.innerHTML = '';
    hbCounter.textContent = 'HB 0';
    lastSectorData = {};
    lastPlayerData = {};
    lastHeartbeatNum = 0;
    pinnedSector = null;
    statHb.textContent = '0';
    statBuilt.textContent = '0';
    statDestroyed.textContent = '0';
    statControl.textContent = '0';
    buildMapDOM();
  });

  // Initial connection
  connect();
  updateButtons();
})();
</script>
</body>
</html>
