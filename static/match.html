<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartClaws — Private Match</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d1a;
  --panel: #12122a;
  --card: #1a1a36;
  --border: #2a2a4a;
  --green: #00ff88;
  --red: #ff4444;
  --blue: #4488ff;
  --yellow: #ffaa00;
  --cyan: #00ccff;
  --magenta: #cc66ff;
  --text: #e0e0f0;
  --text-dim: #8888aa;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
}
.header-title span { color: var(--red); }
.header-sub {
  font-size: 13px;
  color: var(--magenta);
  font-weight: 500;
}
.back-link {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 3px;
}
.back-link:hover { color: var(--cyan); border-color: var(--cyan); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.controls label {
  font-size: 11px;
  color: var(--text-dim);
}
.controls select, .controls input[type="number"] {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 3px;
  outline: none;
}
.controls select:focus, .controls input:focus { border-color: var(--cyan); }
.controls input[type="number"] { width: 70px; }
.ctrl-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 3px;
  cursor: pointer;
}
.ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.ctrl-btn.primary { background: #1a3a2a; border-color: var(--green); color: var(--green); }
.ctrl-btn.primary:hover { background: #2a4a3a; }
.ctrl-btn:disabled { opacity: 0.4; cursor: default; }
.match-status {
  font-size: 12px;
  font-weight: 600;
  margin-left: 8px;
}

/* Layout */
.main {
  display: flex;
  height: calc(100vh - 100px);
}
.left-panel {
  flex: 0 0 55%;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.right-panel {
  flex: 0 0 45%;
  padding: 16px;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Map */
.map-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.map-box h3 { font-size: 13px; color: var(--cyan); margin-bottom: 8px; }
.hex-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
}
.hex-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  position: relative;
  min-height: 36px;
  border: 1px solid transparent;
}
.hex-cell .cell-id { font-size: 6px; opacity: 0.5; }
.hex-cell .cell-info { font-size: 7px; font-weight: 600; }
.ctrl-p1 { border-color: var(--green) !important; }
.ctrl-p2 { border-color: var(--red) !important; }

/* Player panels */
.player-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.player-card h3 { font-size: 13px; margin-bottom: 8px; }
.player-card .p1-color { color: var(--green); }
.player-card .p2-color { color: var(--red); }
.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 2px 0;
}
.stat-row .label { color: var(--text-dim); }
.stat-row .value { font-weight: 600; }

.actions-list {
  margin-top: 6px;
  font-size: 10px;
  max-height: 80px;
  overflow-y: auto;
}
.action-item {
  padding: 2px 0;
  border-bottom: 1px solid #1a1a2a;
}
.action-item.resolved { color: var(--green); }
.action-item.failed { color: var(--red); }

/* Event log */
.event-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.event-card h3 { font-size: 13px; color: var(--yellow); margin-bottom: 8px; }
.event-list {
  flex: 1;
  overflow-y: auto;
  font-size: 10px;
}
.event-row {
  padding: 3px 0;
  border-bottom: 1px solid #1a1a2a;
  line-height: 1.4;
}
.ev-hb { color: var(--yellow); font-weight: 600; margin-right: 4px; }
.ev-type { color: var(--magenta); margin-right: 4px; }

/* Stats */
.stats-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.stats-card h3 { font-size: 13px; color: var(--cyan); margin-bottom: 8px; }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Heart<span>Claws</span></div>
  <div class="header-sub">Private Match</div>
  <a class="back-link" href="./">Back to World</a>
</div>

<div class="controls">
  <label>P1:</label>
  <select id="p1Strat">
    <option value="expansionist">Expansionist</option>
    <option value="economist">Economist</option>
    <option value="aggressor">Aggressor</option>
    <option value="turtle">Turtle</option>
    <option value="random">Random</option>
  </select>
  <label>P2:</label>
  <select id="p2Strat">
    <option value="economist" selected>Economist</option>
    <option value="expansionist">Expansionist</option>
    <option value="aggressor">Aggressor</option>
    <option value="turtle">Turtle</option>
    <option value="random">Random</option>
  </select>
  <label>Seed:</label>
  <input type="number" id="seedInput" value="42" min="0">
  <label>Speed (ms):</label>
  <input type="number" id="speedInput" value="500" min="50" step="50">
  <button class="ctrl-btn primary" id="btnStart">Start</button>
  <button class="ctrl-btn" id="btnPause" disabled>Pause</button>
  <button class="ctrl-btn" id="btnStep" disabled>Step</button>
  <span class="match-status" id="matchStatus">Ready</span>
</div>

<div class="main">
  <div class="left-panel">
    <div class="map-box">
      <h3>Map <span id="hbDisplay" style="float:right;color:var(--yellow)">HB: 0</span></h3>
      <div class="hex-grid" id="hexGrid"></div>
    </div>
    <div style="display:flex;gap:12px;">
      <div class="player-card" style="flex:1">
        <h3 class="p1-color">P1 — <span id="p1Name">expansionist</span></h3>
        <div id="p1Stats"></div>
        <div class="actions-list" id="p1Actions"></div>
      </div>
      <div class="player-card" style="flex:1">
        <h3 class="p2-color">P2 — <span id="p2Name">economist</span></h3>
        <div id="p2Stats"></div>
        <div class="actions-list" id="p2Actions"></div>
      </div>
    </div>
  </div>
  <div class="right-panel">
    <div class="stats-card">
      <h3>Match Stats</h3>
      <div class="stats-grid" id="matchStats"></div>
    </div>
    <div class="event-card">
      <h3>Event Log</h3>
      <div class="event-list" id="eventLog"></div>
    </div>
  </div>
</div>

<script>
/* API Base */
var API_BASE = (function() {
  var path = window.location.pathname.replace(/\/+$/, '');
  if (path.endsWith('.html')) path = path.substring(0, path.lastIndexOf('/'));
  return path;
})();

/* Biome colors */
var BIOME_COLORS = {
  IRONLANDS: '#cc663380', DATAFIELDS: '#3366cc80', GROVELANDS: '#33cc6680',
  BARRENS: '#99663380', NEXUS: '#cc66ff80'
};

/* DOM refs */
var $grid = document.getElementById('hexGrid');
var $hbDisplay = document.getElementById('hbDisplay');
var $p1Name = document.getElementById('p1Name');
var $p2Name = document.getElementById('p2Name');
var $p1Stats = document.getElementById('p1Stats');
var $p2Stats = document.getElementById('p2Stats');
var $p1Actions = document.getElementById('p1Actions');
var $p2Actions = document.getElementById('p2Actions');
var $matchStats = document.getElementById('matchStats');
var $eventLog = document.getElementById('eventLog');
var $matchStatus = document.getElementById('matchStatus');

var $btnStart = document.getElementById('btnStart');
var $btnPause = document.getElementById('btnPause');
var $btnStep = document.getElementById('btnStep');
var $p1Strat = document.getElementById('p1Strat');
var $p2Strat = document.getElementById('p2Strat');
var $seedInput = document.getElementById('seedInput');
var $speedInput = document.getElementById('speedInput');

var ws = null;
var paused = false;
var allEvents = [];

/* WebSocket URL */
function wsUrl() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + API_BASE + '/ws/sim';
}

/* Start */
$btnStart.addEventListener('click', function() {
  if (ws) { ws.close(); ws = null; }
  allEvents = [];
  $eventLog.innerHTML = '';
  paused = false;

  var p1 = $p1Strat.value;
  var p2 = $p2Strat.value;
  var seed = parseInt($seedInput.value) || 42;
  var speed = parseInt($speedInput.value) || 500;

  $p1Name.textContent = p1;
  $p2Name.textContent = p2;
  $matchStatus.textContent = 'Connecting...';
  $matchStatus.style.color = '#ffaa00';

  ws = new WebSocket(wsUrl());

  ws.onopen = function() {
    ws.send(JSON.stringify({ action: 'start', p1: p1, p2: p2, seed: seed, speed_ms: speed }));
    $matchStatus.textContent = 'Running';
    $matchStatus.style.color = '#00ff88';
    $btnStart.textContent = 'Restart';
    $btnPause.disabled = false;
    $btnStep.disabled = true;
    $btnPause.textContent = 'Pause';
  };

  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'heartbeat') {
      updateMatch(msg.data);
    } else if (msg.type === 'error') {
      $matchStatus.textContent = 'Error: ' + msg.message;
      $matchStatus.style.color = '#ff4444';
    }
  };

  ws.onclose = function() {
    $matchStatus.textContent = 'Disconnected';
    $matchStatus.style.color = '#ff4444';
    $btnPause.disabled = true;
    $btnStep.disabled = true;
  };

  ws.onerror = function() {
    $matchStatus.textContent = 'Connection Error';
    $matchStatus.style.color = '#ff4444';
  };
});

/* Pause / Resume */
$btnPause.addEventListener('click', function() {
  if (!ws) return;
  if (paused) {
    ws.send(JSON.stringify({ action: 'resume' }));
    paused = false;
    $btnPause.textContent = 'Pause';
    $btnStep.disabled = true;
    $matchStatus.textContent = 'Running';
    $matchStatus.style.color = '#00ff88';
  } else {
    ws.send(JSON.stringify({ action: 'pause' }));
    paused = true;
    $btnPause.textContent = 'Resume';
    $btnStep.disabled = false;
    $matchStatus.textContent = 'Paused';
    $matchStatus.style.color = '#ffaa00';
  }
});

/* Step */
$btnStep.addEventListener('click', function() {
  if (!ws || !paused) return;
  ws.send(JSON.stringify({ action: 'step' }));
});

/* Speed change */
$speedInput.addEventListener('change', function() {
  if (!ws) return;
  ws.send(JSON.stringify({ action: 'speed', speed_ms: parseInt($speedInput.value) || 500 }));
});

/* Update match UI */
function updateMatch(data) {
  $hbDisplay.textContent = 'HB: ' + data.heartbeat;

  /* Map */
  var sectors = data.map ? data.map.sectors : [];
  var html = '';
  sectors.forEach(function(s) {
    var bg = BIOME_COLORS[s.type] || '#44444480';
    var ctrlClass = s.controller === 'p1' ? ' ctrl-p1' : (s.controller === 'p2' ? ' ctrl-p2' : '');
    var structs = s.structures ? s.structures.length : 0;
    html += '<div class="hex-cell' + ctrlClass + '" style="background:' + bg + '">'
      + '<span class="cell-id">' + s.id + '</span>';
    if (structs > 0) html += '<span class="cell-info">' + structs + '</span>';
    html += '</div>';
  });
  $grid.innerHTML = html;

  /* Player stats */
  if (data.players) {
    renderPlayerStats($p1Stats, data.players.p1);
    renderPlayerStats($p2Stats, data.players.p2);
    renderPlayerActions($p1Actions, data.players.p1);
    renderPlayerActions($p2Actions, data.players.p2);
  }

  /* Match stats */
  if (data.stats) {
    var s = data.stats;
    $matchStats.innerHTML = statRow('Heartbeats', s.total_heartbeats)
      + statRow('Structures Built', s.structures_built)
      + statRow('Structures Destroyed', s.structures_destroyed)
      + statRow('Control Changes', s.control_changes);
  }

  /* Events */
  if (data.events) {
    data.events.forEach(function(ev) { allEvents.unshift(ev); });
    renderEvents();
  }
}

function renderPlayerStats(el, p) {
  if (!p) { el.innerHTML = ''; return; }
  el.innerHTML = statRow('Energy', p.available + ' / ' + p.energy_reserve)
    + statRow('Income', '+' + p.income)
    + statRow('Upkeep', '-' + p.upkeep)
    + statRow('Metal', p.metal)
    + statRow('Data', p.data)
    + statRow('Biomass', p.biomass)
    + statRow('Sectors', p.sectors_controlled)
    + statRow('Structures', (p.structures || []).length);
}

function renderPlayerActions(el, p) {
  if (!p || !p.actions_this_turn || p.actions_this_turn.length === 0) {
    el.innerHTML = '<div style="font-size:10px;color:var(--text-dim);padding:4px 0">No actions</div>';
    return;
  }
  var html = '';
  p.actions_this_turn.forEach(function(a) {
    html += '<div class="action-item ' + a.status + '">' + a.type + ': ' + a.detail + '</div>';
  });
  el.innerHTML = html;
}

function renderEvents() {
  var html = '';
  allEvents.slice(0, 300).forEach(function(ev) {
    html += '<div class="event-row">'
      + '<span class="ev-hb">HB' + ev.heartbeat + '</span>'
      + '<span class="ev-type">' + ev.type + '</span> '
      + esc(ev.description || '')
      + '</div>';
  });
  $eventLog.innerHTML = html;
}

function statRow(label, value) {
  return '<div class="stat-row"><span class="label">' + label + '</span><span class="value">' + value + '</span></div>';
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
